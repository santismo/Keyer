<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#090b10">
  <title>Major Shapes</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f8fc;
      --muted: #8992a3;
      --bg: #090b10;
      --card: #121620;
      --card-2: #181d29;
      --line: #2b3342;
      --lime: #95f0c8;
      --root: #ffd36e;
      --violet: #c4b2ff;
      --black-key: #30394a;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; background: var(--bg); touch-action: manipulation; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: ui-rounded, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: radial-gradient(circle at 50% -30%, #1d2936 0, transparent 34rem), var(--bg);
    }
    button, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, select:focus-visible { outline: 3px solid var(--root); outline-offset: 3px; }
    .app { width: min(100%, 760px); margin: 0 auto; padding: max(18px, env(safe-area-inset-top)) 14px 44px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 2px 2px 16px; }
    h1 { margin: 0; font-size: 1.16rem; letter-spacing: .09em; text-transform: uppercase; }
    .formula { color: var(--lime); font: 700 .72rem ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .1em; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 11px; }
    select, .icon-button { height: 42px; color: var(--ink); background: var(--card-2); border: 1px solid var(--line); border-radius: 11px; }
    select { flex: 1; padding: 0 12px; }
    .icon-button { width: 42px; font-size: 1.2rem; }
    .icon-button:active, .nav:active { transform: scale(.95); }
    .deck { display: grid; grid-template-columns: 43px minmax(0, 1fr) 43px; gap: 8px; align-items: center; }
    .nav { height: 64px; color: var(--muted); background: transparent; border: 1px solid transparent; border-radius: 12px; font-size: 2rem; line-height: 1; }
    .nav:hover { color: var(--ink); background: var(--card); border-color: var(--line); }
    .card { overflow: hidden; min-height: 420px; background: linear-gradient(145deg, #151a25, #10131b); border: 1px solid var(--line); border-radius: 22px; touch-action: pan-y; user-select: none; box-shadow: 0 18px 45px rgba(0,0,0,.27); transition: transform .18s ease, opacity .18s ease; }
    .card.swiping { transform: scale(.985); opacity: .78; }
    .route { min-height: 34px; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 13px 0; color: var(--muted); font-size: .69rem; letter-spacing: .055em; text-transform: uppercase; }
    .route span:last-child { color: var(--lime); white-space: nowrap; }
    .identity { display: flex; align-items: center; justify-content: center; gap: 18px; padding: 18px 14px 16px; }
    .glyph { min-width: 72px; color: var(--violet); font: 2.9rem/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: -.16em; text-align: center; }
    .key-name { font-size: clamp(3.8rem, 17vw, 6.6rem); letter-spacing: -.1em; line-height: .78; font-weight: 800; }
    .key-name small { display: block; margin: 10px 0 0 3px; color: var(--muted); font-size: .13em; letter-spacing: .14em; text-transform: uppercase; }
    .content { border-top: 1px solid var(--line); padding: 13px; }
    .mini-title { margin: 0 0 8px; color: var(--muted); font-size: .68rem; font-weight: 750; letter-spacing: .1em; text-transform: uppercase; }
    .piano-scroll { padding: 2px 1px 8px; }
    .piano { position: relative; width: 100%; height: 106px; overflow: hidden; border: 1px solid #596474; border-radius: 0 0 9px 9px; background: #05070a; box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); }
    .piano-whites { display: grid; grid-template-columns: repeat(15, 1fr); height: 100%; }
    .piano-white { background: #e9edf3; border-right: 1px solid #87909e; }
    .piano-white:last-child { border-right: 0; }
    .piano-white.active { background: var(--lime); }
    .piano-white.root { background: var(--root); }
    .piano-black { position: absolute; z-index: 2; top: 0; width: 5.6%; height: 64%; transform: translateX(-50%); border: 1px solid #050609; border-radius: 0 0 6px 6px; background: var(--black-key); box-shadow: 0 5px 8px rgba(0,0,0,.45); }
    .piano-black.active { background: #8a77d4; }
    .piano-black.root { background: var(--root); }
    .chord-area { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: center; margin-top: 6px; padding-top: 12px; border-top: 1px solid var(--line); }
    .chord-name { color: var(--root); font: 800 1.35rem/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: -.08em; white-space: nowrap; }
    .chord-tones { display: flex; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }
    .tone { min-width: 42px; padding: 5px 6px; color: var(--ink); text-align: center; border: 1px solid var(--line); border-radius: 7px; background: var(--card-2); font-size: .73rem; font-weight: 800; }
    .tone b { display: block; color: var(--muted); font-size: .55rem; letter-spacing: .07em; }
    .legend { margin-top: 24px; }
    .legend-head { display: flex; align-items: baseline; justify-content: space-between; margin: 0 3px 9px; }
    h2 { margin: 0; font-size: .8rem; letter-spacing: .1em; text-transform: uppercase; }
    .legend-head span { color: var(--muted); font-size: .68rem; }
    .legend-keyboard { position: relative; height: 115px; }
    .legend-whites { position: absolute; inset: 42px 0 0; display: grid; grid-template-columns: repeat(7, 1fr); }
    .legend-card { min-height: 73px; padding: 7px 3px; color: var(--ink); background: var(--card); border: 1px solid var(--line); border-right-width: 0; border-radius: 0 0 7px 7px; text-align: center; }
    .legend-card:last-child { border-right-width: 1px; }
    .legend-card:hover, .legend-card.current { border-color: var(--lime); background: #172329; }
    .legend-key { display: block; font-size: .72rem; font-weight: 800; }
    .legend-glyph { display: block; margin-top: 1px; color: var(--violet); font: 1rem/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: -.12em; }
    .legend-card.black { position: absolute; z-index: 2; top: 0; width: 12.8%; min-height: 48px; padding: 5px 2px; border: 1px solid #050609; border-radius: 0 0 7px 7px; background: var(--black-key); box-shadow: 0 4px 7px rgba(0,0,0,.35); }
    .legend-card.black:hover, .legend-card.black.current { background: #554e7d; border-color: var(--lime); }
    @media (max-width: 510px) {
      .app { padding-inline: 9px; }
      .deck { grid-template-columns: 32px minmax(0, 1fr) 32px; gap: 3px; }
      .nav { font-size: 1.55rem; }
      .card { min-height: 360px; border-radius: 18px; }
      .identity { gap: 10px; }
      .glyph { min-width: 58px; font-size: 2.25rem; }
      .legend-key { font-size: .67rem; }
      .legend-glyph { font-size: .9rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header><h1>Major shapes</h1><div class="formula">W W H&nbsp; | &nbsp;W W W H</div></header>
    <div class="toolbar">
      <select id="mode" aria-label="Practice order">
        <option value="random">Random</option><option value="chromatic">Chromatic</option><option value="fifths">Fifths</option><option value="fourths">Fourths</option><option value="progressions">Progressions + modulations</option>
      </select>
      <button class="icon-button" id="refresh" type="button" aria-label="New set">↻</button>
    </div>
    <section class="deck" aria-label="Infinite scale-card deck">
      <button class="nav" id="previous" type="button" aria-label="Previous card">‹</button>
      <article class="card" id="card" aria-live="polite">
        <div class="route"><span id="route">Chromatic</span><span id="position">∞</span></div>
        <div class="identity"><div class="glyph" id="glyph">=</div><div class="key-name" id="keyName">C<small>major</small></div></div>
        <div class="content">
          <p class="mini-title">Two octaves</p>
          <div class="piano-scroll"><div class="piano" id="keyboard" aria-label="Two-octave piano keyboard"></div></div>
          <div class="chord-area"><div><p class="mini-title">Current 7th</p><div class="chord-name" id="chordName">Cmaj7</div></div><div class="chord-tones" id="chordTones"></div></div>
        </div>
      </article>
      <button class="nav" id="next" type="button" aria-label="Next card">›</button>
    </section>
    <section class="legend" aria-labelledby="legend-title">
      <div class="legend-head"><h2 id="legend-title">Chromatic legend</h2><span>tap a key</span></div>
      <div class="legend-keyboard" id="legend"></div>
    </section>
  </main>
  <script>
    (() => {
      const MAJOR_STEPS = [0, 2, 4, 5, 7, 9, 11];
      const BLACK_PCS = new Set([1, 3, 6, 8, 10]);
      const keys = [
        { id:'C', pc:0, name:'C', glyph:'=', notes:['C','D','E','F','G','A','B'] },
        { id:'Db', pc:1, name:'D♭', glyph:'W', notes:['D♭','E♭','F','G♭','A♭','B♭','C'] },
        { id:'D', pc:2, name:'D', glyph:'M', notes:['D','E','F♯','G','A','B','C♯'] },
        { id:'Eb', pc:3, name:'E♭', glyph:'w', notes:['E♭','F','G','A♭','B♭','C','D'] },
        { id:'E', pc:4, name:'E', glyph:'m', notes:['E','F♯','G♯','A','B','C♯','D♯'] },
        { id:'F', pc:5, name:'F', glyph:'//', notes:['F','G','A','B♭','C','D','E'] },
        { id:'Gb', pc:6, name:'G♭', glyph:'\\V', notes:['G♭','A♭','B♭','C♭','D♭','E♭','F'] },
        { id:'G', pc:7, name:'G', glyph:'_A', notes:['G','A','B','C','D','E','F♯'] },
        { id:'Ab', pc:8, name:'A♭', glyph:'Vu', notes:['A♭','B♭','C','D♭','E♭','F','G'] },
        { id:'A', pc:9, name:'A', glyph:'An', notes:['A','B','C♯','D','E','F♯','G♯'] },
        { id:'Bb', pc:10, name:'B♭', glyph:'u/', notes:['B♭','C','D','E♭','F','G','A'] },
        { id:'B', pc:11, name:'B', glyph:'n\\', notes:['B','C♯','D♯','E','F♯','G♯','A♯'] }
      ];
      const byId = Object.fromEntries(keys.map(key => [key.id, key]));
      const chromatic = keys.map(key => key.id);
      const fifths = ['C','G','D','A','E','B','Gb','Db','Ab','Eb','Bb','F'];
      const fourths = ['C','F','Bb','Eb','Ab','Db','Gb','B','E','A','D','G'];
      const degreeData = [{ degree:'I', suffix:'maj7' }, { degree:'ii', suffix:'m7' }, { degree:'iii', suffix:'m7' }, { degree:'IV', suffix:'maj7' }, { degree:'V', suffix:'7' }, { degree:'vi', suffix:'m7' }, { degree:'vii', suffix:'ø7' }];
      const el = {
        mode: document.querySelector('#mode'), refresh: document.querySelector('#refresh'), card: document.querySelector('#card'), previous: document.querySelector('#previous'), next: document.querySelector('#next'), route: document.querySelector('#route'), position: document.querySelector('#position'), glyph: document.querySelector('#glyph'), keyName: document.querySelector('#keyName'), keyboard: document.querySelector('#keyboard'), chordName: document.querySelector('#chordName'), chordTones: document.querySelector('#chordTones'), legend: document.querySelector('#legend')
      };
      let deck = [];
      let index = 0;
      let startX = 0;
      const mod = (number, base) => ((number % base) + base) % base;
      const keyAt = pc => keys.find(key => key.pc === mod(pc, 12));
      const shuffle = list => { const copy = [...list]; for (let i = copy.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [copy[i], copy[j]] = [copy[j], copy[i]]; } return copy; };
      const chordFor = (key, degreeIndex = 0) => { const data = degreeData[degreeIndex]; const notes = [0,2,4,6].map(step => key.notes[(degreeIndex + step) % 7]); return { degree: data.degree, name: `${key.notes[degreeIndex]}${data.suffix}`, notes }; };
      const event = (key, degreeIndex, label, route) => ({ key, chord: chordFor(key, degreeIndex), label, route });
      const series = (ids, label) => ids.map(id => event(byId[id], 0, 'I', label));
      function progressionDeck() {
        const tonic = keys[Math.floor(Math.random() * keys.length)];
        const target = keyAt(tonic.pc + 7);
        const chromaticTarget = keyAt(tonic.pc + 1);
        const recipes = [
          () => [event(tonic,1,'ii',`ii–V–I · ${tonic.name}`), event(tonic,4,'V',`ii–V–I · ${tonic.name}`), event(tonic,0,'I',`ii–V–I · ${tonic.name}`)],
          () => [event(tonic,0,'I',`I–V–vi–IV · ${tonic.name}`), event(tonic,4,'V',`I–V–vi–IV · ${tonic.name}`), event(tonic,5,'vi',`I–V–vi–IV · ${tonic.name}`), event(tonic,3,'IV',`I–V–vi–IV · ${tonic.name}`)],
          () => [event(tonic,5,'vi',`vi–ii–V–I · ${tonic.name}`), event(tonic,1,'ii',`vi–ii–V–I · ${tonic.name}`), event(tonic,4,'V',`vi–ii–V–I · ${tonic.name}`), event(tonic,0,'I',`vi–ii–V–I · ${tonic.name}`)],
          () => [event(tonic,0,'I',`${tonic.name} → ${target.name} · +P5`), event(target,4,'V',`${tonic.name} → ${target.name} · V–I`), event(target,0,'I',`${tonic.name} → ${target.name} · landed`)],
          () => [event(tonic,0,'I',`${tonic.name} → ${chromaticTarget.name} · +m2`), event(chromaticTarget,4,'V',`${tonic.name} → ${chromaticTarget.name} · V–I`), event(chromaticTarget,0,'I',`${tonic.name} → ${chromaticTarget.name} · landed`)],
          () => [event(tonic,0,'I',`minor color · ${tonic.name}`), event(tonic,5,'vi',`minor color · ${tonic.name}`), event(tonic,1,'ii',`minor color · ${tonic.name}`), event(tonic,4,'V',`minor color · ${tonic.name}`), event(tonic,0,'I',`minor color · ${tonic.name}`)]
        ];
        return recipes[Math.floor(Math.random() * recipes.length)]();
      }
      function createDeck() {
        const mode = el.mode.value;
        if (mode === 'random') deck = series(shuffle(chromatic), 'random');
        if (mode === 'chromatic') deck = series(chromatic, 'chromatic');
        if (mode === 'fifths') deck = series(fifths, 'fifths');
        if (mode === 'fourths') deck = series(fourths, 'fourths');
        if (mode === 'progressions') deck = progressionDeck();
        index = 0;
        render();
      }
      function current() { return deck[index]; }
      function renderKeyboard(key) {
        const active = new Set(MAJOR_STEPS.map(step => mod(key.pc + step, 12)));
        const whitePcs = [0,2,4,5,7,9,11, 0,2,4,5,7,9,11,0];
        const blackKeys = [[1,6.667], [3,13.333], [6,26.667], [8,33.333], [10,40], [1,53.333], [3,60], [6,73.333], [8,80], [10,86.667]];
        const whites = whitePcs.map(pc => `<div class="piano-white${active.has(pc) ? ' active' : ''}${key.pc === pc ? ' root' : ''}"></div>`).join('');
        const blacks = blackKeys.map(([pc, left]) => `<div class="piano-black${active.has(pc) ? ' active' : ''}${key.pc === pc ? ' root' : ''}" style="left:${left}%"></div>`).join('');
        el.keyboard.innerHTML = `<div class="piano-whites">${whites}</div>${blacks}`;
      }
      function render() {
        const item = current();
        if (!item) return;
        el.route.textContent = item.route;
        el.position.textContent = el.mode.value === 'progressions' ? `${index + 1} / ${deck.length}` : '∞';
        el.glyph.textContent = item.key.glyph;
        el.keyName.innerHTML = `${item.key.name}<small>major · ${item.label}</small>`;
        renderKeyboard(item.key);
        el.chordName.textContent = item.chord.name;
        el.chordTones.innerHTML = item.chord.notes.map((note, i) => `<span class="tone"><b>${['R','3','5','7'][i]}</b>${note}</span>`).join('');
        document.querySelectorAll('.legend-card').forEach(button => button.classList.toggle('current', button.dataset.id === item.key.id));
      }
      function go(direction) {
        if (direction > 0) {
          if (index >= deck.length - 1) {
            if (el.mode.value === 'progressions' || el.mode.value === 'random') createDeck();
            else { index = 0; render(); }
          } else { index += 1; render(); }
        } else if (index > 0) { index -= 1; render(); }
        else if (el.mode.value !== 'progressions' && el.mode.value !== 'random') { index = deck.length - 1; render(); }
      }
      function buildLegend() {
        const whiteRow = document.createElement('div');
        whiteRow.className = 'legend-whites';
        const blackPositions = { Db:'7.15%', Eb:'21.45%', Gb:'50%', Ab:'64.3%', Bb:'78.6%' };
        keys.forEach(key => {
          const button = document.createElement('button');
          button.type = 'button'; button.className = 'legend-card'; button.dataset.id = key.id;
          button.innerHTML = `<span class="legend-key">${key.name}</span><span class="legend-glyph">${key.glyph}</span>`;
          button.addEventListener('click', () => { deck = [event(key,0,'I','selected')]; index = 0; render(); });
          if (BLACK_PCS.has(key.pc)) { button.classList.add('black'); button.style.left = blackPositions[key.id]; el.legend.appendChild(button); }
          else { whiteRow.appendChild(button); }
        });
        el.legend.appendChild(whiteRow);
      }
      el.mode.addEventListener('change', createDeck);
      el.refresh.addEventListener('click', createDeck);
      el.previous.addEventListener('click', () => go(-1));
      el.next.addEventListener('click', () => go(1));
      el.card.addEventListener('pointerdown', e => { startX = e.clientX; el.card.classList.add('swiping'); });
      el.card.addEventListener('pointerup', e => { const distance = e.clientX - startX; el.card.classList.remove('swiping'); if (Math.abs(distance) > 38) go(distance < 0 ? 1 : -1); });
      el.card.addEventListener('pointercancel', () => el.card.classList.remove('swiping'));
      document.addEventListener('keydown', e => { if (e.target.matches('select')) return; if (e.key === 'ArrowRight') go(1); if (e.key === 'ArrowLeft') go(-1); });
      buildLegend();
      createDeck();
    })();
  </script>
</body>
</html>
